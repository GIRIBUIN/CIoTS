<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZZZ - Pre Sleep Prediction</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    h1, h2 {
      margin-top: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    button {
      margin-top: 18px;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }
    pre {
      background: #f7f7f7;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }
    .desc {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Pre-sleep Prediction</h1>
    <p>취침 전 입력값을 바탕으로 수면 질 저하 위험을 예측하는 화면입니다.</p>
    <p><a href="/">← index로 돌아가기</a></p>
  </div>

  <div class="box">
    <h2>입력값</h2>
    <p class="desc">
      현재는 화면/응답 구조를 먼저 맞추는 단계입니다.
      실제 Fitbit/센서 데이터 수집이 연결되면 입력값이 자동으로 채워지도록 구현해야합니다.
    </p>

    <div class="grid">
      <div>
        <label for="userId">user_id</label>
        <input type="text" id="userId" value="user-01" />
      </div>

      <div>
        <label for="avgHr">avg_hr_1h</label>
        <input type="number" id="avgHr" value="82" />
      </div>

      <div>
        <label for="stepsSum">steps_sum_1h</label>
        <input type="number" id="stepsSum" value="210" />
      </div>

      <div>
        <label for="caloriesSum">calories_sum_1h</label>
        <input type="number" id="caloriesSum" value="58" />
      </div>

      <div>
        <label for="avgTemp">avg_temp_1h</label>
        <input type="number" id="avgTemp" value="24.5" step="0.1" />
      </div>

      <div>
        <label for="avgHumidity">avg_humidity_1h</label>
        <input type="number" id="avgHumidity" value="58" step="0.1" />
      </div>

      <div>
        <label for="avgMq5">avg_mq5_index_1h</label>
        <input type="number" id="avgMq5" value="0.42" step="0.01" />
      </div>

      <div>
        <label for="recentAvgSleep">recent_avg_sleep_minutes</label>
        <input type="number" id="recentAvgSleep" value="405" />
      </div>
    </div>

    <button id="predictBtn">예측 요청</button>
  </div>

  <div class="box">
    <h2>응답 결과</h2>
    <p>현재는 하드코딩형태로 predictionService.js가 작동하고 있습니다. 개인 맞춤형으로 수정해야합니다.</p>
    <pre id="resultBox">아직 요청하지 않았습니다.</pre>
  </div>

  <script src="/presleep.js"></script>
</body>
</html>
